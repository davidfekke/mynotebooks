[workspace]
authors = ["davidfekke <david@fekke.com>"]
channels = ["conda-forge"]
name = "unit-5-lessons"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
pytorch = ">=2.6.0,<3"
numpy = ">=1.26,<2.0"
nltk = ">=3.9.3,<4"
gensim = ">=4.3.2,<5"
scipy = ">=1.12,<1.13"
transformers = ">=5.3.0,<6"

[pypi-dependencies]
# Apple Silicon TensorFlow + Metal plugin from PyPI
tensorflow = "==2.18.1"
tensorflow-metal = "==1.2.0"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.10.8,<4"
ipykernel = ">=7.2.0,<8"
scikit-learn = ">=1.7.2,<2"
seaborn = ">=0.13.2,<0.14"
