[workspace]
authors = ["davidfekke <david@fekke.com>"]
channels = ["conda-forge"]
name = "unit-4-capstone"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
verify-tf = "python -c 'import tensorflow as tf, numpy as np; print(\"tf:\", tf.__version__); print(\"np:\", np.__version__); print(\"gpus:\", tf.config.list_physical_devices(\"GPU\"))'"

[dependencies]
python = "3.12.*"
pytorch = ">=2.6.0,<3"
numpy = ">=2.0,<2.1.0"
# TensorFlow macOS wheels require NumPy <2.0; pin to a compatible release

[pypi-dependencies]
# Apple Silicon TensorFlow + Metal plugin from PyPI
tensorflow = "==2.18.1"
tensorflow-metal = "==1.2.0"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.10.8,<4"
ipykernel = ">=7.2.0,<8"
scikit-learn = ">=1.7.2,<2"
seaborn = ">=0.13.2,<0.14"
